<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospitals - Blood Bank Management System</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <script src="/static/js/auth.js?v=2"></script>
    <script>checkAuth(['Admin']);</script>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">🩸</div>
            <h2 class="sidebar-title">Life Link</h2>
        </div>
        <nav>
            <ul class="sidebar-nav">
                <li class="sidebar-nav-item"><a href="/static/index.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><i class="fas fa-chart-line"></i></span><span>Dashboard</span></a></li>
                <li class="sidebar-nav-item"><a href="/static/profile.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><i class="fas fa-user"></i></span><span>Profile</span></a></li>
                <li class="sidebar-nav-item"><a href="/static/donors.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><i class="fas fa-users"></i></span><span>Donors</span></a></li>
                <li class="sidebar-nav-item"><a href="/static/donor_health.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><i class="fas fa-hospital"></i></span><span>Health Screening</span></a></li>
                <li class="sidebar-nav-item"><a href="/static/donations.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><i class="fas fa-syringe"></i></span><span>Donations</span></a></li>
                <li class="sidebar-nav-item"><a href="/static/stock.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><i class="fas fa-box"></i></span><span>Blood Stock</span></a></li>
                <li class="sidebar-nav-item"><a href="/static/requests.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><i class="fas fa-clipboard"></i></span><span>Requests</span></a></li>
                <li class="sidebar-nav-item"><a href="/static/hospitals.html" class="sidebar-nav-link active"><span class="sidebar-nav-icon"><i class="fas fa-hospital-user"></i></span><span>Hospitals</span></a></li>
                <li class="sidebar-nav-item"><a href="/static/reports.html" class="sidebar-nav-link"><span class="sidebar-nav-icon"><i class="fas fa-chart-bar"></i></span><span>Reports</span></a></li>
                <li class="sidebar-nav-item"><a href="/logout" class="sidebar-nav-link logout-link"><span class="sidebar-nav-icon"><i class="fas fa-sign-out-alt"></i></span><span>Logout</span></a></li>
            </ul>
        </nav>
    </aside>
    <div class="main-content-with-sidebar">
        <nav class="sidebar-top-nav">
            <div style="display: flex; align-items: center; gap: 15px; flex: 1;">
                <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
                <div id="userGreeting" class="user-greeting" style="position: relative; transform: none; right: auto; top: auto;"></div>
            </div>
        </nav>
        <!-- Main Content -->
    <div class="container">
        <script src="/static/js/sidebar.js"></script>
        <!-- Page Header -->
        <div class="page-header">
            <h1 class="page-title">Hospitals</h1>
            <p class="page-subtitle">Manage hospitals registered in the system</p>
        </div>

        <!-- Action Bar -->
        <div class="card" style="margin-bottom: 2rem;">
            <div style="display: flex; justify-content: flex-end;">
                <button class="btn btn-primary" onclick="openAddModal()">
                    <span>➕</span>
                    <span>Add Hospital</span>
                </button>
            </div>
        </div>

        <!-- Hospitals Table -->
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">All Hospitals</h2>
                <span class="card-icon">🏥</span>
            </div>
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Hospital ID</th>
                            <th>Hospital Name</th>
                            <th>Location</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="hospitalsTableBody">
                        <tr>
                            <td colspan="4" style="text-align: center;">
                                <div class="spinner"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Add Hospital Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Add New Hospital</h2>
                <button class="modal-close" onclick="closeAddModal()">&times;</button>
            </div>
            <form id="addHospitalForm" onsubmit="addHospital(event)">
                <div class="form-group">
                    <label class="form-label">Hospital Name *</label>
                    <input type="text" name="hospital_name" class="form-input" placeholder="e.g. Government Medical College Hospital" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" class="form-input" placeholder="e.g. Thiruvananthapuram, Kerala">
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                    <button type="button" class="btn btn-outline" onclick="closeAddModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Hospital</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/hospitals.js?v=2"></script>
</body>
</html>
